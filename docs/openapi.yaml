openapi: 3.1.0
info:
  title: GoDestino API
  description: SaaS airport transport platform — multi-tenant API for LATAM
  version: 1.0.0
  contact:
    name: GoDestino Team

servers:
  - url: https://godestino-api-production.up.railway.app
    description: Production
  - url: http://localhost:8080
    description: Local development

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TenantID:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
    PathID:
      name: id
      in: path
      required: true
      schema:
        type: string
  schemas:
    APIResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
        error:
          type: string
        meta:
          $ref: "#/components/schemas/Meta"
    Meta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total_count:
          type: integer
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    LoginResponse:
      type: object
      properties:
        token:
          type: string
        refresh_token:
          type: string
        user:
          type: object
    CreateUserRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [SUPER_ADMIN, ADMINISTRADOR, CLIENTE_CONCESION, TESORERIA_CLIENTE, MESA_CONTROL, OPERADOR, TAXISTA, VENDEDOR, BROKER, USUARIO]

paths:
  /health:
    get:
      summary: Health check
      tags: [System]
      security: []
      responses:
        "200":
          description: Service healthy

  /ready:
    get:
      summary: Readiness probe
      tags: [System]
      security: []
      responses:
        "200":
          description: Service ready

  # ── Auth (public) ──────────────────────────
  /api/v1/auth/register:
    post:
      summary: Register new user
      tags: [Auth]
      security: []
      parameters:
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
        "400":
          description: Validation error
        "409":
          description: Email already registered

  /api/v1/auth/login:
    post:
      summary: Login
      tags: [Auth]
      security: []
      parameters:
        - $ref: "#/components/parameters/TenantID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
        "401":
          description: Invalid credentials
        "429":
          description: Account locked

  /api/v1/auth/refresh:
    post:
      summary: Refresh JWT token
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Token refreshed
        "401":
          description: Invalid refresh token

  /api/v1/auth/forgot-password:
    post:
      summary: Request password reset
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Reset link sent (always returns success)

  /api/v1/auth/reset-password:
    post:
      summary: Reset password with token
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token:
                  type: string
                new_password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password reset
        "400":
          description: Invalid or expired token

  # ── Auth (protected) ──────────────────────
  /api/v1/auth/me:
    get:
      summary: Get current user info
      tags: [Auth]
      responses:
        "200":
          description: Current user claims

  /api/v1/auth/change-password:
    post:
      summary: Change password
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_password, new_password]
              properties:
                old_password:
                  type: string
                new_password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password changed

  /api/v1/auth/logout:
    post:
      summary: Logout (blacklist token)
      tags: [Auth]
      responses:
        "200":
          description: Logged out

  # ── Routes ─────────────────────────────────
  /api/v1/routes:
    post:
      summary: Create route
      tags: [Routes]
      responses:
        "201":
          description: Route created
    get:
      summary: List routes
      tags: [Routes]
      responses:
        "200":
          description: Route list

  /api/v1/routes/{id}:
    get:
      summary: Get route by ID
      tags: [Routes]
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          description: Route details
    put:
      summary: Update route
      tags: [Routes]
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          description: Route updated
    delete:
      summary: Delete route
      tags: [Routes]
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          description: Route deleted

  # ── Tickets ────────────────────────────────
  /api/v1/tickets/purchase:
