  /api/v1/bookings/estimate:
    post:
      summary: Get price estimate
      tags: [Bookings]
      responses:
        "200":
          description: Price estimate

  /api/v1/bookings/{id}/start:
    put:
      summary: Start trip
      tags: [Bookings]
      parameters:
