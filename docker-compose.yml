version: "3.9"

services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - APP_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=destino
      - DB_PASSWORD=destino
      - DB_NAME=destino
      - DB_SSLMODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=dev-secret-change-in-production
      - JWT_EXPIRE_HOURS=24
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001,https://godestino-kiosk.direccion-2ac.workers.dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=destino
      - POSTGRES_PASSWORD=destino
      - POSTGRES_DB=destino
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
      - ./migrations/002_v2_modules.sql:/docker-entrypoint-initdb.d/002_v2_modules.sql
      - ./migrations/003_v3_robustify.sql:/docker-entrypoint-initdb.d/003_v3_robustify.sql
      - ./migrations/004_v4_kiosk_ux.sql:/docker-entrypoint-initdb.d/004_v4_kiosk_ux.sql
      - ./migrations/005_v5_kiosk_monitoring.sql:/docker-entrypoint-initdb.d/005_v5_kiosk_monitoring.sql
      - ./migrations/006_v6_stabilization.sql:/docker-entrypoint-initdb.d/006_v6_stabilization.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U destino"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
